version: '3.3'

services:
  gymora-next:
    container_name: gymora-next
    restart: always
    image: node:20.10.0
    ports:
      - 4003:3000
    environment:
      - PORT=3000

    volumes:
      - ./:/usr/src/gymora-next
    working_dir: /usr/src/gymora-next

    networks:
      - client-network

    # FOR PRODUCTION
    command: bash -c "yarn && yarn run build && yarn run start"

networks:
  client-network:
    driver: bridge
